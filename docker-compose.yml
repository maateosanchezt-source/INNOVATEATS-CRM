name: innovateats-outreach-os

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: innovateats
      POSTGRES_USER: innovateats
      POSTGRES_PASSWORD: innovateats-local-only
      PGDATA: /var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innovateats -d innovateats"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  temporal:
    image: temporalio/auto-setup:1.31.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: innovateats
      POSTGRES_PWD: innovateats-local-only
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 10s
      retries: 30
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.50.0
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  object-storage:
    image: quay.io/minio/minio:RELEASE.2025-10-15T17-29-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: innovateats-local
      MINIO_ROOT_PASSWORD: replace-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - object-storage-data:/data

  mailpit:
    image: axllent/mailpit:v1.30.0
    ports:
      - "1025:1025"
      - "8025:8025"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://innovateats:innovateats-local-only@postgres:5432/innovateats
      AUTHORIZED_EMAIL: maateosanchezt@gmail.com
      BETTER_AUTH_SECRET: local-docker-secret-replace-before-any-shared-use
      GLOBAL_DRY_RUN: "true"
      GMAIL_DELIVERY_MODE: dry_run
      EMAIL_SEND_ENABLED: "false"
      AUTONOMOUS_SEND_ENABLED: "false"
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://innovateats:innovateats-local-only@postgres:5432/innovateats
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: innovateats-main
      AUTHORIZED_EMAIL: maateosanchezt@gmail.com
      GLOBAL_DRY_RUN: "true"
      GMAIL_DELIVERY_MODE: dry_run
      EMAIL_SEND_ENABLED: "false"
      AUTONOMOUS_SEND_ENABLED: "false"
      WORKER_HEALTH_PORT: 3001
    ports:
      - "3001:3001"

volumes:
  object-storage-data:
  postgres-data:
