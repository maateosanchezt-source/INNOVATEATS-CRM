name: innovateats-outreach-os-production

x-runtime: &runtime
  env_file:
    - runtime.env
  init: true
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

services:
  bootstrap:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
      target: worker-runtime
    image: ${INNOVATEATS_WORKER_IMAGE:-innovateats-crm-worker:local}
    env_file:
      - runtime.env
    init: true
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    command: ["node", "packages/db/dist/bootstrap-cli.js"]

  web:
    <<: *runtime
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: web-runtime
    image: ${INNOVATEATS_WEB_IMAGE:-innovateats-crm-web:local}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-3000}:3000"

  worker:
    <<: *runtime
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
      target: worker-runtime
    image: ${INNOVATEATS_WORKER_IMAGE:-innovateats-crm-worker:local}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    expose:
      - "3001"
